version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medconnect
      POSTGRES_PASSWORD: medconnect
      POSTGRES_DB: medconnect
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U medconnect -d medconnect']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://medconnect:medconnect@postgres:5432/medconnect?schema=public&connection_limit=20&pool_timeout=30
      REDIS_URL: redis://redis:6379
      PORT: '3000'
      NODE_ENV: production
      CORS_ORIGINS: http://localhost:3001,http://web:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - '3001:3001'
    environment:
      NEXT_PUBLIC_API_URL: http://api:3000/api
      PORT: '3001'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001 || exit 1']
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
